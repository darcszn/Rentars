name: Contracts CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.81.0"

jobs:
  contracts-ci:
    name: Contract CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/contracts/target/
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('apps/contracts/**/Cargo.lock', 'apps/contracts/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-
            ${{ runner.os }}-cargo-

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run workspace contract tests
        run: cargo test --verbose

      - name: Build WASM — workspace root
        run: cargo build --target wasm32-unknown-unknown --release --verbose

      - name: Build WASM — property-listing
        working-directory: apps/contracts/contracts/property-listing
        run: cargo build --target wasm32-unknown-unknown --release --verbose

      - name: Build WASM — booking
        working-directory: apps/contracts/contracts/booking
        run: cargo build --target wasm32-unknown-unknown --release --verbose

      - name: Build WASM — review-contract
        working-directory: apps/contracts/contracts/review-contract
        run: cargo build --target wasm32-unknown-unknown --release --verbose
