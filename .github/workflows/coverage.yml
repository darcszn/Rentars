name: Coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  coverage:
    name: Test Coverage & Codecov Upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      - name: Install backend dependencies
        working-directory: apps/backend
        run: bun install

      - name: Run backend tests with coverage
        working-directory: apps/backend
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=./coverage
        env:
          SUPABASE_URL: https://mock.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: mock-key
          JWT_SECRET: mock-jwt-secret-min-32-characters-long
          STELLAR_NETWORK: testnet
          REDIS_URL: ''

      - name: Run frontend tests with coverage
        working-directory: apps/web
        run: npx vitest run --coverage
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/backend/coverage/lcov.info,./apps/web/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          verbose: true
