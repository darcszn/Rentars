name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'package.json'
      - 'biome.json'
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'package.json'
      - 'biome.json'

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Biome CI (strict mode, no auto-fix)
        run: biome ci --formatter-enabled=false --linter-enabled=true --organize-imports-enabled=false apps/backend/

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run TypeScript type check
        working-directory: apps/backend
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests (Bun)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: stable

      - name: Install backend dependencies
        working-directory: apps/backend
        run: bun install

      - name: Run unit tests with coverage
        working-directory: apps/backend
        run: bun test tests/unit --coverage --coverage-reporter=lcov --coverage-dir=./coverage
        env:
          SUPABASE_URL: https://mock.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: mock-key
          JWT_SECRET: mock-jwt-secret-min-32-characters-long
          STELLAR_NETWORK: testnet
          REDIS_URL: ''

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-unit-coverage
          path: apps/backend/coverage/
          retention-days: 7

  integration-tests:
    name: Integration Tests (Bun)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: stable

      - name: Install backend dependencies
        working-directory: apps/backend
        run: bun install

      - name: Run integration tests
        working-directory: apps/backend
        run: bun test tests/integration --passWithNoTests
        env:
          SUPABASE_URL: https://mock.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: mock-key
          JWT_SECRET: mock-jwt-secret-min-32-characters-long
          STELLAR_NETWORK: testnet
          REDIS_URL: ''
          PORT: '3000'
          CORS_ORIGIN: http://localhost:3001
          PROPERTY_LISTING_CONTRACT_ID: test-contract-id
          BOOKING_CONTRACT_ID: test-contract-id
          TRUSTLESS_WORK_API_URL: https://sandbox.trustlesswork.com
          TRUSTLESS_WORK_API_KEY: test-key
