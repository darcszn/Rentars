name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'package.json'
      - 'biome.json'
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'package.json'
      - 'biome.json'

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Biome CI (strict mode, no auto-fix)
        run: biome ci --formatter-enabled=false --linter-enabled=true --organize-imports-enabled=false apps/backend/

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run TypeScript type check
        working-directory: apps/backend
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        working-directory: apps/backend
        run: npx jest --ci --passWithNoTests