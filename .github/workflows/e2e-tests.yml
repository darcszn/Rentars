name: Playwright E2E Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  playwright-e2e:
    name: Playwright E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]

    env:
      BACKEND_PORT: 3000
      FRONTEND_PORT: 3001
      NEXT_PUBLIC_API_URL: http://localhost:3000
      PLAYWRIGHT_BASE_URL: http://localhost:3001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: stable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browser (${{ matrix.project }})
        working-directory: apps/web
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.project }}-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.project }}-
            ${{ runner.os }}-playwright-

      - name: Build frontend
        working-directory: apps/web
        run: yarn build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:${{ env.BACKEND_PORT }}
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key

      - name: Install backend dependencies
        working-directory: apps/backend
        run: bun install

      - name: Start backend
        working-directory: apps/backend
        run: |
          SUPABASE_URL=http://localhost \
          SUPABASE_SERVICE_ROLE_KEY=ci \
          JWT_SECRET=ci-jwt-secret-minimum-32-characters \
          PORT=${{ env.BACKEND_PORT }} \
          STELLAR_NETWORK=testnet \
          STELLAR_RPC_URL=https://soroban-testnet.stellar.org \
          PROPERTY_LISTING_CONTRACT_ID=ci \
          BOOKING_CONTRACT_ID=ci \
          TRUSTLESS_WORK_API_URL=http://localhost \
          TRUSTLESS_WORK_API_KEY=ci \
          REDIS_URL='' \
          CORS_ORIGIN=http://localhost:${{ env.FRONTEND_PORT }} \
          bun run src/index.ts &
          echo $! > /tmp/backend.pid

      - name: Start frontend
        working-directory: apps/web
        run: |
          NEXT_PUBLIC_API_URL=http://localhost:${{ env.BACKEND_PORT }} \
          npx next start --hostname 0.0.0.0 --port ${{ env.FRONTEND_PORT }} &
          echo $! > /tmp/frontend.pid

      - name: Wait for services to be ready
        run: |
          echo "Waiting for backend and frontend..."
          for i in $(seq 1 40); do
            BACKEND_OK=false
            FRONTEND_OK=false
            curl -sf http://localhost:${{ env.BACKEND_PORT }}/health && BACKEND_OK=true
            curl -sf http://localhost:${{ env.FRONTEND_PORT }} && FRONTEND_OK=true
            if $BACKEND_OK && $FRONTEND_OK; then
              echo "Both services are ready"
              exit 0
            fi
            sleep 3
          done
          echo "Services failed to start within timeout"
          echo "=== Backend logs ==="
          cat /tmp/backend.log 2>/dev/null || true
          exit 1

      - name: Run Playwright tests (${{ matrix.project }})
        working-directory: apps/web
        run: npx playwright test --project=${{ matrix.project }} --reporter=html --pass-with-no-tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:${{ env.FRONTEND_PORT }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}-${{ github.sha }}
          path: apps/web/playwright-report/
          retention-days: 14
