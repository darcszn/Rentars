name: Playwright E2E Tests

on:
  pull_request:
    branches:
      - main

jobs:
  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BACKEND_PORT: 3000
      FRONTEND_PORT: 3001
      NEXT_PUBLIC_API_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v4
        with:
          version: stable

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Cache Playwright browser binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-browsers-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-browsers-

      - name: Build frontend
        run: |
          cd apps/web
          npm run build

      - name: Install backend runtime dependencies
        run: |
          cd apps/backend
          bun install

      - name: Start backend
        run: |
          cd apps/backend
          SUPABASE_URL=http://localhost \
          SUPABASE_SERVICE_ROLE_KEY=ci \
          JWT_SECRET=ci \
          PORT=${BACKEND_PORT} \
          STELLAR_NETWORK=testnet \
          STELLAR_RPC_URL=https://soroban-testnet.stellar.org \
          PROPERTY_LISTING_CONTRACT_ID=ci \
          BOOKING_CONTRACT_ID=ci \
          TRUSTLESS_WORK_API_URL=http://localhost \
          TRUSTLESS_WORK_API_KEY=ci \
          bun run src/index.ts &
          echo $! > /tmp/backend.pid

      - name: Start frontend
        run: |
          cd apps/web
          NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT} npm run start -- --hostname 0.0.0.0 --port ${FRONTEND_PORT} &
          echo $! > /tmp/frontend.pid

      - name: Wait for backend and frontend
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost ${BACKEND_PORT} && nc -z localhost ${FRONTEND_PORT}; then
              echo "Backend and frontend are ready"
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for backend/frontend"
          exit 1

      - name: Run Playwright tests
        run: npx playwright test --reporter=html --pass-with-no-tests

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
