name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Weekly security scan every Sunday at midnight
    - cron: '0 0 * * 0'

jobs:
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Audit backend dependencies
        working-directory: apps/backend
        # Using yarn audit — report high/critical only; don't fail CI on moderate
        run: yarn audit --level high || true

      - name: Audit frontend dependencies
        working-directory: apps/web
        run: yarn audit --level high || true

  rust-security:
    name: Rust Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        working-directory: apps/contracts
        run: cargo audit

  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for secret scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  owasp-zap:
    name: OWASP ZAP API Security Scan
    runs-on: ubuntu-latest
    # Only run on scheduled and manual triggers to avoid slow CI on every PR
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: stable

      - name: Install backend dependencies
        working-directory: apps/backend
        run: bun install

      - name: Start backend for ZAP scanning
        working-directory: apps/backend
        run: |
          SUPABASE_URL=http://localhost \
          SUPABASE_SERVICE_ROLE_KEY=ci \
          JWT_SECRET=ci-jwt-secret-minimum-32-characters \
          PORT=3000 \
          STELLAR_NETWORK=testnet \
          REDIS_URL='' \
          PROPERTY_LISTING_CONTRACT_ID=test \
          BOOKING_CONTRACT_ID=test \
          TRUSTLESS_WORK_API_URL=http://localhost \
          TRUSTLESS_WORK_API_KEY=test \
          bun run src/index.ts &
          sleep 5

      - name: Wait for backend
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/health; then exit 0; fi
            sleep 2
          done
          exit 1

      - name: Run ZAP baseline scan against API
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-I'   # -I = don't fail on warnings, only hard errors
          artifact_name: 'zap-report'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report-${{ github.sha }}
          path: report_html.html
          retention-days: 30

  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@v2.3.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard results to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard.sarif
