name: Contract Tests

on:
  push:
    branches:
      - main
    paths:
      - 'apps/contracts/**'
      - '.github/workflows/contract-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/contracts/**'
      - '.github/workflows/contract-tests.yml'

env:
  CARGO_TERM_COLOR: always
  # Pin the Rust toolchain so the cache key is stable
  RUST_TOOLCHAIN: "1.81.0"

jobs:
  contract-tests:
    name: Soroban Contract Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/contracts

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Rust toolchain ───────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      # ── Rust dependency cache ────────────────────────────────────────────────
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/contracts/target/
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('apps/contracts/**/Cargo.lock', 'apps/contracts/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-
            ${{ runner.os }}-cargo-

      # ── Format check ────────────────────────────────────────────────────────
      - name: Check formatting (cargo fmt)
        run: cargo fmt --all -- --check

      # ── Clippy lints ─────────────────────────────────────────────────────────
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # ── Unit tests (native target) ───────────────────────────────────────────
      - name: Run unit tests — workspace root
        run: cargo test --verbose

      - name: Run unit tests — property-listing
        working-directory: apps/contracts/contracts/property-listing
        run: cargo test --verbose

      - name: Run unit tests — booking
        working-directory: apps/contracts/contracts/booking
        run: cargo test --verbose

      - name: Run unit tests — review-contract
        working-directory: apps/contracts/contracts/review-contract
        run: cargo test --verbose

      # ── WASM build ───────────────────────────────────────────────────────────
      - name: Build WASM — workspace root
        run: cargo build --target wasm32-unknown-unknown --release --verbose

      - name: Build WASM — property-listing
        working-directory: apps/contracts/contracts/property-listing
        run: cargo build --target wasm32-unknown-unknown --release --verbose

      - name: Build WASM — booking
        working-directory: apps/contracts/contracts/booking
        run: cargo build --target wasm32-unknown-unknown --release --verbose

      - name: Build WASM — review-contract
        working-directory: apps/contracts/contracts/review-contract
        run: cargo build --target wasm32-unknown-unknown --release --verbose

      # ── Verify WASM artefacts exist ──────────────────────────────────────────
      - name: Verify WASM artefacts
        working-directory: apps/contracts
        run: |
          echo "Checking WASM artefacts..."
          ls -lh target/wasm32-unknown-unknown/release/*.wasm
          for wasm in \
            target/wasm32-unknown-unknown/release/property_listing.wasm \
            target/wasm32-unknown-unknown/release/booking.wasm \
            target/wasm32-unknown-unknown/release/review_contract.wasm; do
            if [[ ! -f "${wasm}" ]]; then
              echo "ERROR: Missing WASM artefact: ${wasm}"
              exit 1
            fi
            echo "OK: ${wasm} ($(du -h "${wasm}" | cut -f1))"
          done

      # ── Upload WASM artefacts ────────────────────────────────────────────────
      - name: Upload WASM artefacts
        uses: actions/upload-artifact@v4
        with:
          name: rentars-wasm-${{ github.sha }}
          path: apps/contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 30
          if-no-files-found: error
