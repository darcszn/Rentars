# Redis configuration for local development

# Bind to localhost only
bind 127.0.0.1

# Default port
port 6379

# Disable persistence in development (comment out for production)
save ""
appendonly no

# Max memory: 256 MB with LRU eviction
maxmemory 256mb
maxmemory-policy allkeys-lru

# Log level
loglevel notice

# Timeout idle connections after 300s
timeout 300

# TCP keepalive
tcp-keepalive 60
